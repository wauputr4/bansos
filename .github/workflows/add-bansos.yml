name: Add Bansos

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON payload generated by bansosdev CLI'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Add bansos item
        id: add-item
        run: node scripts/add-bansos.mjs --json "$BANSOS_PAYLOAD"
        env:
          BANSOS_PAYLOAD: ${{ inputs.payload }}

      - name: Resolve item metadata
        id: resolve-item-metadata
        run: |
          item_id="$(node -e 'const payload = JSON.parse(process.env.BANSOS_PAYLOAD); process.stdout.write(payload.id || "")')"
          item_title="$(node -e 'const payload = JSON.parse(process.env.BANSOS_PAYLOAD); process.stdout.write(payload.title || "")')"
          echo "item_id=$item_id" >> "$GITHUB_OUTPUT"
          echo "item_title=$item_title" >> "$GITHUB_OUTPUT"
        env:
          BANSOS_PAYLOAD: ${{ inputs.payload }}

      - name: Generate commit contributors
        env:
          BANSOS_TARGET_IDS: ${{ steps.resolve-item-metadata.outputs.item_id }}
        run: npm run generate:commit-contributors

      - run: npm run build

      - name: Create pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.BANSOS_PAT || github.token }}
          ITEM_ID: ${{ steps.resolve-item-metadata.outputs.item_id }}
          ITEM_TITLE: ${{ steps.resolve-item-metadata.outputs.item_title }}
          AUTH_TOKEN: ${{ secrets.BANSOS_PAT || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="bansos/direct-${{ github.run_id }}-${ITEM_ID}"

          git switch -c "$branch"
          git remote set-url origin https://x-access-token:${AUTH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git add src/lib/data/bansos.json src/lib/data/commit-contributors.json
          git commit -m "feat: add ${ITEM_TITLE}"
          git push --force origin "$branch"

          PR_BODY="Auto-generated from maintainer direct mode.

          ## Summary
          - Add ${item_title} to the bansos list.
          - Source payload comes from trusted maintainer direct mode.

          This PR keeps main branch changes behind review and GitHub Pages deployment."

          PR_BODY=$(echo "$PR_BODY" | sed 's/^[ \t]*//')

          pr_url="$(
            gh pr create \
              --title "Tambah bansos: ${ITEM_TITLE}" \
              --body "$PR_BODY" \
              --base main \
              --head "$branch"
          )"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"
