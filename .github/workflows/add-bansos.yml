name: Add Bansos

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON payload generated by bansosdev CLI'
        required: true
        type: string

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Add bansos item
        run: node scripts/add-bansos.mjs --json "$BANSOS_PAYLOAD"
        env:
          BANSOS_PAYLOAD: ${{ inputs.payload }}

      - run: npm run build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/bansos.ts
          git commit -m "feat: add bansos from CLI"
          git push

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name bansos --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
